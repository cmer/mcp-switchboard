name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (web + server)
        run: npm run build

      - name: Unit tests
        run: npm test

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -t mcp-switchboard .

      - name: Smoke test image
        run: |
          docker run -d --rm --name smoke -p 8787:8787 mcp-switchboard
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8787/api/auth/me > /dev/null; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8787/api/auth/me
          curl -sf -o /dev/null http://localhost:8787/
          docker stop smoke
